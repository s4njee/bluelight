<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bluelight</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(120, 100, 220, 0.5);
      font-family: sans-serif;
      font-size: 13px;
      pointer-events: none;
      letter-spacing: 0.1em;
      transition: opacity 1.5s;
    }
    #hud {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      pointer-events: none;
    }
    #hud span {
      color: rgba(100, 80, 180, 0.35);
      transition: color 0.2s;
    }
    #hud span.on {
      color: rgba(160, 140, 255, 0.85);
    }
  </style>
</head>
<body>
  <div id="hint">drag to orbit &nbsp;·&nbsp; scroll to zoom</div>
  <div id="hud">
    <span>C &nbsp;chroma</span>
    <span>V &nbsp;vignette</span>
    <span>X &nbsp;pixel</span>
    <span>Z &nbsp;grain</span>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
